<a class="skip-link" href="#main-content">{{ content().accessibility.skipLinkLabel }}</a>

<app-header />

<main id="main-content" tabindex="-1">
  <router-outlet />
</main>

<app-footer />

@if (showBackToTop()) {
  <button
    type="button"
    class="back-to-top"
    [attr.aria-label]="content().accessibility.backToTopLabel"
    (click)="backToTop()"
  >
    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path d="M12 4 5 11l2.3 2.3 3.1-3.1V20h3.2v-9.8l3.1 3.1L19 11 12 4Z" />
    </svg>
  </button>
}
