<div
  class="language-switcher"
  role="group"
  [attr.aria-label]="content().accessibility.languageSwitcherLabel"
>
  <span class="language-switcher__label">{{
    content().accessibility.languageSwitcherVisibleLabel
  }}</span>
  <button
    type="button"
    class="language-switcher__button"
    [class.language-switcher__button--active]="currentLanguage() === 'pt-BR'"
    [attr.aria-label]="content().accessibility.portugueseLanguageLabel"
    [attr.aria-pressed]="currentLanguage() === 'pt-BR'"
    (click)="setPortuguese()"
  >
    <svg class="language-switcher__flag" viewBox="0 0 24 16" aria-hidden="true" focusable="false">
      <rect width="24" height="16" rx="2" fill="#229e45" />
      <path d="M12 2.2 21 8l-9 5.8L3 8l9-5.8Z" fill="#f8e509" />
      <circle cx="12" cy="8" r="3.1" fill="#2b49a3" />
      <path
        d="M8.95 7.25c2.1-.48 4.02-.18 5.8.9"
        fill="none"
        stroke="#fff"
        stroke-width=".55"
        stroke-linecap="round"
      />
    </svg>
    <span>{{ content().accessibility.portugueseLanguageShortLabel }}</span>
  </button>

  <button
    type="button"
    class="language-switcher__button"
    [class.language-switcher__button--active]="currentLanguage() === 'en'"
    [attr.aria-label]="content().accessibility.englishLanguageLabel"
    [attr.aria-pressed]="currentLanguage() === 'en'"
    (click)="setEnglish()"
  >
    <svg class="language-switcher__flag" viewBox="0 0 24 16" aria-hidden="true" focusable="false">
      <rect width="24" height="16" rx="2" fill="#fff" />
      <path
        d="M0 0h24v1.23H0V0Zm0 2.46h24v1.23H0V2.46Zm0 2.46h24v1.23H0V4.92Zm0 2.46h24v1.23H0V7.38Zm0 2.46h24v1.23H0V9.84Zm0 2.46h24v1.23H0V12.3Zm0 2.46h24V16H0v-1.24Z"
        fill="#b22234"
      />
      <path d="M0 0h10.4v8.6H0V0Z" fill="#3c3b6e" />
      <path
        d="M1.25 1.25h.9v.9h-.9v-.9Zm2 0h.9v.9h-.9v-.9Zm2 0h.9v.9h-.9v-.9Zm2 0h.9v.9h-.9v-.9Zm-5 2h.9v.9h-.9v-.9Zm2 0h.9v.9h-.9v-.9Zm2 0h.9v.9h-.9v-.9Zm2 0h.9v.9h-.9v-.9Zm-7 2h.9v.9h-.9v-.9Zm2 0h.9v.9h-.9v-.9Zm2 0h.9v.9h-.9v-.9Zm2 0h.9v.9h-.9v-.9Z"
        fill="#fff"
      />
    </svg>
    <span>{{ content().accessibility.englishLanguageShortLabel }}</span>
  </button>
</div>
