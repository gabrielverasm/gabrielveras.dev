<header class="site-header">
  <div class="site-header__inner">
    <a class="site-header__brand" href="#main-content" aria-label="Gabriel Veras">
      <img
        class="site-header__avatar"
        src="/images/profile-avatar.webp"
        width="40"
        height="40"
        [alt]="content().accessibility.profilePhotoAlt"
      />
      <span class="site-header__name">{{ content().hero.name }}</span>
      <span class="site-header__role">{{ content().hero.role }}</span>
    </a>

    <nav
      class="site-header__nav"
      [attr.aria-label]="content().accessibility.primaryNavigationLabel"
    >
      @for (item of content().navigation; track item.href) {
        <a class="site-header__link" [href]="item.href">{{ item.label }}</a>
      }
    </nav>

    <div class="site-header__tools">
      <app-accessibility-controls />
      <app-language-switcher />
    </div>
  </div>
</header>
