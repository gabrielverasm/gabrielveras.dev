<header>
  <div class="wrap">
    <div class="menu-row">
      <nav [attr.aria-label]="content().accessibility.primaryNavigationLabel">
        @for (item of content().navigation; track item.href) {
          <a class="link" [href]="item.href">{{ item.label }}</a>
        }
      </nav>
    </div>
    <div class="controls-strip">
      <app-language-switcher />
      <app-accessibility-controls />
    </div>
  </div>
</header>
