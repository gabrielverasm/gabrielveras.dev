<div
  class="accessibility-controls"
  role="group"
  [attr.aria-label]="content().accessibility.accessibilityControlsLabel"
>
  <span class="accessibility-controls__font-group">
    <button
      type="button"
      class="accessibility-controls__button accessibility-controls__button--font"
      [attr.aria-label]="content().accessibility.decreaseFontSizeLabel"
      [disabled]="!canDecreaseFontSize()"
      (click)="decreaseFontSize()"
    >
      {{ content().accessibility.decreaseFontSizeShortLabel }}
    </button>
    <button
      type="button"
      class="accessibility-controls__button accessibility-controls__button--font-reset"
      [attr.aria-label]="content().accessibility.resetFontSizeLabel"
      [disabled]="!canResetFontSize()"
      (click)="resetFontSize()"
    >
      {{ content().accessibility.resetFontSizeShortLabel }}
    </button>
    <button
      type="button"
      class="accessibility-controls__button accessibility-controls__button--font"
      [attr.aria-label]="content().accessibility.increaseFontSizeLabel"
      [disabled]="!canIncreaseFontSize()"
      (click)="increaseFontSize()"
    >
      {{ content().accessibility.increaseFontSizeShortLabel }}
    </button>
  </span>
  <button
    type="button"
    class="accessibility-controls__button accessibility-controls__button--contrast"
    [class.accessibility-controls__button--active]="isHighContrast()"
    [attr.aria-label]="
      isHighContrast()
        ? content().accessibility.disableHighContrastLabel
        : content().accessibility.enableHighContrastLabel
    "
    [attr.aria-pressed]="isHighContrast()"
    (click)="toggleHighContrast()"
  >
    {{ content().accessibility.highContrastLabel }}
  </button>
</div>
