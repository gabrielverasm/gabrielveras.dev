<section class="section contribution-section" aria-labelledby="contribution-title">
  <div class="section__header">
    <h2 id="contribution-title">{{ content().contribution.title }}</h2>
  </div>

  <ul class="contribution-list">
    @for (item of content().contribution.items; track item) {
      <li class="info-block contribution-item">
        <span aria-hidden="true"></span>
        <p>{{ item }}</p>
      </li>
    }
  </ul>
</section>
