<section id="contact" class="section contact-section" aria-labelledby="contact-title">
  <div class="contact-panel">
    <div class="section__header">
      <h2 id="contact-title">{{ content().contact.title }}</h2>
      <p>{{ content().contact.intro }}</p>
    </div>

    <address class="contact-list">
      <a class="contact-link contact-link--primary" [href]="externalLinks.email.href">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M4 6h16v12H4z" />
          <path d="m4 7 8 6 8-6" />
        </svg>
        <span>{{ content().contact.emailLabel }}</span>
      </a>
      @if (resumeHref(); as href) {
        <a class="contact-link" [href]="href">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M12 3v12m0 0 4-4m-4 4-4-4M5 21h14" />
          </svg>
          <span>{{ resumeLabel() }}</span>
        </a>
      }
      <a
        class="contact-link"
        [href]="externalLinks.linkedin.href"
        rel="noopener noreferrer"
        target="_blank"
      >
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M4 4h16v16H4z" />
          <path d="M8 11v5" />
          <path d="M8 8.2v.1" />
          <path d="M12 16v-5" />
          <path d="M12 13.2c0-1.4.9-2.4 2.3-2.4s2.2 1 2.2 2.6V16" />
        </svg>
        <span>{{ content().contact.linkedinLabel }}</span>
      </a>
      @if (externalLinks.github.href) {
        <a
          class="contact-link"
          [href]="externalLinks.github.href"
          rel="noopener noreferrer"
          target="_blank"
        >
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path
              d="M15 21v-3.5a4.2 4.2 0 0 0-1.1-3c3.7-.4 6.6-1.8 6.6-7a5.5 5.5 0 0 0-1.5-3.9 5.1 5.1 0 0 0-.2-3.1s-1.3-.4-4.1 1.5a14.1 14.1 0 0 0-7.4 0C4.5.1 3.2.5 3.2.5A5.1 5.1 0 0 0 3 3.6a5.5 5.5 0 0 0-1.5 3.9c0 5.2 2.9 6.6 6.6 7a4.2 4.2 0 0 0-1.1 3V21"
            />
            <path d="M7 18c-2.8.8-2.8-1.4-4-1.8" />
          </svg>
          <span>{{ content().contact.githubLabel }}</span>
        </a>
      }
    </address>
  </div>
</section>
