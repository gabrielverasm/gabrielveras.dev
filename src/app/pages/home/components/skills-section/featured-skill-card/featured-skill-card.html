<article class="skill-card skill-card--featured">
  <app-skill-orbit-visual />
  <p class="skill-card__badge">{{ featuredLabel() }}</p>
  <div class="skill-card__header">
    <span class="skill-card__icon" aria-hidden="true">
      <app-portfolio-icon [kind]="group().iconKind ?? 'backend'" />
    </span>
    <div>
      <h3>{{ group().title }}</h3>
      @if (group().description) {
        <p>{{ group().description }}</p>
      }
    </div>
  </div>
  <app-skill-metrics [metrics]="metrics()" />
  <app-skill-chip-list [items]="group().items" />
  <app-skill-learning-panel [learning]="learning()" />
</article>
